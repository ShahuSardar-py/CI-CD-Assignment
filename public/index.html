<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card - Shahu Sardar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .id-card {
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        .photo {
            width: 100px;
            height: 100px;
            background: #ddd;
            margin: 0 auto 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #333;
        }
        p {
            margin: 5px 0;
            color: #666;
        }
        .company {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="id-card">
        <div class="photo">Photo</div>
        <h1>Shahu Sardar</h1>
        <p>Software Engineer Trainee</p>
        <p class="company">Equation Works</p>
    </div>
</body>
</html>
